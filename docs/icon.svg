<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect width="512" height="512" rx="112" fill="#3D7BE0"/>
  <!-- calendar body (white frame) -->
  <rect x="100" y="142" width="312" height="286" rx="44" fill="#FFFFFF"/>
  <!-- binder tabs: blue ring (separation) + white pill -->
  <rect x="154" y="91" width="50" height="110" rx="25" fill="#3D7BE0"/>
  <rect x="161" y="98" width="36" height="96" rx="18" fill="#FFFFFF"/>
  <rect x="302" y="91" width="50" height="110" rx="25" fill="#3D7BE0"/>
  <rect x="309" y="98" width="36" height="96" rx="18" fill="#FFFFFF"/>
  <!-- blue inner panel below the header -->
  <rect x="131" y="223" width="250" height="167" rx="10" fill="#3D7BE0"/>
  <!-- day cells: 3 top, 2 bottom -->
  <g fill="#EFF4FC">
    <rect x="158" y="251" width="50" height="50" rx="11"/>
    <rect x="231" y="251" width="50" height="50" rx="11"/>
    <rect x="304" y="251" width="50" height="50" rx="11"/>
    <rect x="158" y="321" width="50" height="50" rx="11"/>
    <rect x="231" y="321" width="50" height="50" rx="11"/>
  </g>
</svg>
