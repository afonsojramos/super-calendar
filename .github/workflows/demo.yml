name: Demo

# Builds the example as a static web app and publishes it to GitHub Pages so the
# docs can embed a live, interactive demo. Requires Pages to be enabled for the
# repo with "GitHub Actions" as the source (Settings → Pages).

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; let an in-progress run finish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: jdx/mise-action@v4
      - run: pnpm install --frozen-lockfile
      # The react-native-web demo is served at the root of the custom domain
      # (demo.super-calendar.afonsojramos.me), so the export keeps the default
      # root base path (no EXPO_BASE_URL).
      - run: pnpm --filter @super-calendar/example-native exec expo export --platform web
      # The react-dom demo is served from the /dom/ subpath, so Vite needs a
      # matching base so its assets resolve.
      - run: pnpm --filter @super-calendar/example-web exec -- vite build --base=/dom/
      # Assemble both demos into one Pages artifact: native at the root, dom at /dom/.
      - name: Assemble site
        run: |
          rm -rf _site
          mkdir -p _site
          cp -r examples/native/dist/. _site/
          mkdir -p _site/dom
          cp -r examples/web/dist/. _site/dom/
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
