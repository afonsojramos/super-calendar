name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  # Opens/updates a release PR aggregating conventional commits, and tags
  # releases for the changed @super-calendar/* packages when that PR merges.
  # The node-workspace plugin rolls an internal bump (core) into its dependents.
  release-please:
    runs-on: ubuntu-latest
    outputs:
      releases_created: ${{ steps.release.outputs.releases_created }}
      paths_released: ${{ steps.release.outputs.paths_released }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release

  publish:
    needs: release-please
    if: ${{ needs.release-please.outputs.releases_created == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # npm Trusted Publishing (OIDC, provenance) — no NPM_TOKEN
    steps:
      - uses: actions/checkout@v7
      - uses: jdx/mise-action@v4
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: pnpm -r publish --access public --provenance --no-git-checks
      # JSR registry (Deno), via the same GitHub OIDC token (no JSR_TOKEN). Each
      # package must exist on jsr.io and be linked to this repository for OIDC to
      # authorize. Best-effort: a JSR failure surfaces as a run warning but never
      # fails the (already-done) npm publish above, and one package failing does
      # not skip the others.
      - name: Publish to JSR
        run: |
          failed=""
          for pkg in core dom native; do
            if ! (cd "packages/$pkg" && pnpm dlx jsr publish --allow-dirty); then
              echo "::warning title=JSR publish failed::@super-calendar/$pkg was not published to JSR"
              failed="$failed $pkg"
            fi
          done
          if [ -n "$failed" ]; then
            echo "::warning title=JSR publish incomplete::Not published to JSR:$failed"
          fi
